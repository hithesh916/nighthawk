<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGISTRY — Night Hawk</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { alabaster: '#F9F8F6', charcoal: '#1A1A1A', taupe: '#EBE5DE', warmgrey: '#6C6863', gold: '#D4AF37' },
            fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Playfair Display', 'serif'] },
            letterSpacing: { widest: '0.3em' }
          }
        }
      }
    </script>
</head>
<body class="bg-alabaster text-charcoal antialiased relative selection:bg-charcoal selection:text-alabaster min-h-screen flex flex-col items-center justify-center py-20">

<div class="noise-overlay"></div>
<div class="editorial-grid">
  <div class="grid-line"></div>
  <div class="grid-line hidden md:block"></div>
  <div class="grid-line hidden md:block"></div>
  <div class="grid-line hidden xl:block"></div>
  <div class="grid-line"></div>
</div>

<nav class="fixed top-0 w-full z-40 bg-alabaster/90 backdrop-blur-md border-b border-charcoal/10 transition-all duration-700">
  <div class="max-w-[1600px] mx-auto px-8 md:px-16 flex items-center justify-between h-20">
    <a href="index.html" class="flex items-center">
      <img src="logo.png" class="h-10 md:h-12 w-auto object-contain" alt="NIGHT HAWK">
    </a>
    <span class="text-[10px] uppercase tracking-widest text-warmgrey">Client Registry</span>
  </div>
</nav>

<div class="w-full max-w-md px-8 relative z-50 mx-auto pt-24 md:pt-40">
  <div class="text-center mb-12">
    <h1 class="serif text-5xl mb-4">The <span class="italic text-gold">Registry.</span></h1>
    <p class="text-sm font-light text-charcoal/60">Curate your exclusive profile.</p>
  </div>

  <div class="space-y-8">
    <button id="googleSignup" class="w-full h-14 border border-charcoal/20 flex items-center justify-center space-x-4 hover:border-gold hover:text-gold transition-all duration-500 bg-transparent text-charcoal group">
      <svg width="20" height="20" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      <span class="text-xs font-semibold uppercase tracking-widest">Register via Google Portal</span>
    </button>
  </div>

  <div class="mt-12 text-center">
    <p class="text-[10px] uppercase tracking-widest text-warmgrey mb-4">Already Registered?</p>
    <a href="login.html" class="text-xs uppercase tracking-widest text-charcoal hover:text-gold transition-colors duration-500 border-b border-charcoal/10 pb-1">Client Login</a>
  </div>
</div>

<!-- TOAST -->
<div class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-charcoal text-alabaster text-[10px] uppercase tracking-widest px-8 py-4 z-[60] transform translate-y-24 opacity-0 transition-all duration-500 shadow-[0_8px_32px_rgba(0,0,0,0.15)]" id="toast"></div>


<script src="script.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, updateProfile, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  
  const firebaseConfig = {
    apiKey: "AIzaSyBqnA9nVNJXFVSt9CmqcePFDQg6JivIAQw",
    authDomain: "nighthawk-ea06f.firebaseapp.com",
    projectId: "nighthawk-ea06f",
    storageBucket: "nighthawk-ea06f.firebasestorage.app",
    messagingSenderId: "663976377908",
    appId: "1:663976377908:web:b9058cd3075fadf6b59461",
    measurementId: "G-1VBN9W8P4D"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // Set Persistence
  setPersistence(auth, browserLocalPersistence);

  const provider = new GoogleAuthProvider();

  // Mobile Detection
  const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 768;

  // Handle Redirect Result
  getRedirectResult(auth)
    .then((result) => {
      if (result) {
        showToast('Identity Established.');
        setTimeout(() => { window.location.href = 'index.html'; }, 1000);
      }
    }).catch((error) => {
      console.error(error);
      showToast('Studio Connection Failed.');
    });

  document.getElementById('googleSignup').addEventListener('click', async () => {
    showToast('Establishing Connection...');
    
    // Check storage availability
    const isStorageAccessible = () => {
      try {
        sessionStorage.setItem('hawk_test', '1');
        sessionStorage.removeItem('hawk_test');
        return true;
      } catch (e) {
        return false;
      }
    };

    if (!isStorageAccessible()) {
      showToast('Browser Blocking Storage. Disable Private Mode.');
      console.warn("Storage unreachable. Attempting Popup Fallback.");
      try {
        await signInWithPopup(auth, provider);
        window.location.href = 'index.html';
      } catch (err) {
        console.error("Popup fallback failed:", err);
        showToast('Portal Connection Blocked by Browser.');
      }
      return;
    }

    try {
      // PRO-STRATEGY: Try Popup first everywhere. 
      // Redirect often fails on mobile due to "Unable to save initial state" (Storage/Cookie blocks).
      const result = await signInWithPopup(auth, provider);
      if (result) {
        showToast('Identity Established.');
        setTimeout(() => { window.location.href = 'index.html'; }, 1000);
      }
    } catch (error) {
      console.error("Auth Error:", error);
      
      if (error.code === 'auth/popup-blocked') {
        showToast('Popup Blocked. Switching to Redirect...');
        try {
          await signInWithRedirect(auth, provider);
        } catch (redirErr) {
          console.error("Redirect Error:", redirErr);
          showToast('Redirect Failed. Check Browser Security.');
        }
      } else if (error.message.includes('Unable to save initial state')) {
        showToast('Storage Blocked. Disable Private Mode / Cross-Site Tracking.');
      } else if (error.code === 'auth/unauthorized-domain') {
        showToast('Unauthorized Domain. Add this URL to Firebase Console.');
      } else {
        showToast('Studio Connection Failed.');
      }
    }
  });
</script>
</body>
</html>
