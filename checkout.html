<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECURE CHECKOUT — Night Hawk</title>
    <link rel="icon" type="image/png" href="logo.png">
    <!-- Tailwind and Fonts setup -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { alabaster: '#F9F8F6', charcoal: '#1A1A1A', taupe: '#EBE5DE', warmgrey: '#6C6863', gold: '#D4AF37' },
            fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Playfair Display', 'serif'] },
            letterSpacing: { widest: '0.3em' }
          }
        }
      }
    </script>
    <!-- EmailJS script -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>
      (function() {
        emailjs.init("F_1UpCCI_QYyFOuMq"); // Public Key from previous knowledge
      })();
    </script>
</head>
<body class="bg-alabaster text-charcoal antialiased relative selection:bg-charcoal selection:text-alabaster">

<div class="noise-overlay"></div>
<div class="editorial-grid">
  <div class="grid-line"></div>
  <div class="grid-line hidden md:block"></div>
  <div class="grid-line hidden md:block"></div>
  <div class="grid-line hidden xl:block"></div>
  <div class="grid-line"></div>
</div>

<!-- NAVIGATION (Simple) -->
<nav class="fixed top-0 w-full z-40 bg-alabaster/90 backdrop-blur-md border-b border-charcoal/10 transition-all duration-700">
  <div class="max-w-[1600px] mx-auto px-8 md:px-16 flex items-center justify-between h-20">
    <a href="index.html" class="flex items-center">
      <img src="logo.png" class="h-10 md:h-12 w-auto object-contain" alt="NIGHT HAWK">
    </a>
    <span class="text-[10px] uppercase tracking-widest text-warmgrey">Secure Checkout</span>
  </div>
</nav>

<!-- CHECKOUT LAYOUT -->
<section class="max-w-[1200px] mx-auto px-8 md:px-16 pt-32 pb-24 grid grid-cols-1 lg:grid-cols-12 gap-16 relative">
  <!-- FORM Area -->
  <div class="lg:col-span-7">
    <div class="flex items-center space-x-6 mb-8 mt-4">
      <div class="h-px w-12 bg-charcoal"></div>
      <span class="text-xs uppercase tracking-[0.3em] text-warmgrey">Billing Details</span>
    </div>
    <h2 class="serif text-4xl md:text-5xl mb-12">The <span class="italic text-gold">Details.</span></h2>
    
    <form class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-10" id="checkoutForm">
      <div>
        <label class="block text-[10px] uppercase tracking-[0.3em] text-warmgrey mb-2">First Name</label>
        <input type="text" id="firstName" class="w-full bg-transparent border-b border-charcoal/20 py-2 text-sm focus:outline-none focus:border-gold transition-colors duration-500" required>
      </div>
      <div>
        <label class="block text-[10px] uppercase tracking-[0.3em] text-warmgrey mb-2">Last Name</label>
        <input type="text" id="lastName" class="w-full bg-transparent border-b border-charcoal/20 py-2 text-sm focus:outline-none focus:border-gold transition-colors duration-500" required>
      </div>
      <div class="md:col-span-2">
        <label class="block text-[10px] uppercase tracking-[0.3em] text-warmgrey mb-2">Email Address</label>
        <input type="email" id="userEmail" class="w-full bg-transparent border-b border-charcoal/20 py-2 text-sm focus:outline-none focus:border-gold transition-colors duration-500" required>
      </div>
      <div class="md:col-span-2">
        <label class="block text-[10px] uppercase tracking-[0.3em] text-warmgrey mb-2">Shipping Address</label>
        <input type="text" id="userAddress" class="w-full bg-transparent border-b border-charcoal/20 py-2 text-sm focus:outline-none focus:border-gold transition-colors duration-500" required>
      </div>
      <div>
        <label class="block text-[10px] uppercase tracking-[0.3em] text-warmgrey mb-2">City</label>
        <input type="text" id="userCity" class="w-full bg-transparent border-b border-charcoal/20 py-2 text-sm focus:outline-none focus:border-gold transition-colors duration-500" required>
      </div>
      <div>
        <label class="block text-[10px] uppercase tracking-[0.3em] text-warmgrey mb-2">Postal Code</label>
        <input type="text" id="userZip" class="w-full bg-transparent border-b border-charcoal/20 py-2 text-sm focus:outline-none focus:border-gold transition-colors duration-500" required>
      </div>
      <div class="md:col-span-2 mb-8">
        <label class="block text-[10px] uppercase tracking-[0.3em] text-warmgrey mb-2">Phone Number</label>
        <input type="tel" id="userPhone" class="w-full bg-transparent border-b border-charcoal/20 py-2 text-sm focus:outline-none focus:border-gold transition-colors duration-500" required>
      </div>

      <div class="md:col-span-2 border-t border-charcoal/10 pt-12">
        <div class="flex items-center space-x-6 mb-8">
          <div class="h-px w-8 bg-charcoal"></div>
          <span class="text-xs uppercase tracking-[0.3em] text-warmgrey">Payment</span>
        </div>
        <div class="flex items-center space-x-4">
          <label class="flex items-center cursor-pointer text-sm tracking-wide text-charcoal">
            <input type="radio" name="payment" value="COD" checked id="payCOD" class="mr-3 accent-charcoal"> Cash on Delivery
          </label>
          <label class="flex items-center cursor-not-allowed text-sm tracking-wide text-warmgrey/50">
            <input type="radio" name="payment" disabled class="mr-3"> Online Payment (Soon)
          </label>
        </div>
      </div>
    </form>
  </div>

  <!-- SUMMARY Box -->
  <aside class="lg:col-span-5 h-fit lg:sticky lg:top-32 bg-alabaster border border-charcoal/10 p-8 shadow-[0_4px_24px_rgba(0,0,0,0.02)] relative z-20">
    <h3 class="serif text-2xl tracking-wide text-charcoal mb-8 border-b border-charcoal/10 pb-4">The Bag</h3>
    <div id="checkoutList" class="mb-8 overflow-y-auto max-h-[300px]">
      <!-- Populated via JS -->
    </div>
    
    <div class="flex justify-between items-center text-[10px] uppercase tracking-widest text-warmgrey mb-4">
      <span>Subtotal</span> <span class="font-serif text-sm text-charcoal" id="subtotalPrice">₹0</span>
    </div>
    <div class="flex justify-between items-center text-[10px] uppercase tracking-widest text-warmgrey mb-8">
      <span>Shipping</span> <span class="text-gold font-medium">Complimentary</span>
    </div>
    
    <div class="border-t border-charcoal/10 pt-6 flex justify-between items-end mb-8">
      <span class="text-xs uppercase tracking-[0.3em] text-charcoal font-medium">Total</span>
      <span class="font-serif text-3xl tracking-wide text-charcoal" id="totalPrice">₹0</span>
    </div>
    
    <button type="submit" form="checkoutForm" class="btn-luxury w-full group">
      <span class="btn-bg-gold group-hover:bg-charcoal transition-colors"></span> <!-- Inverting behavior intentionally or keeping gold default -->
      <!-- Standard luxury button uses 1A1A1A background with D4AF37 sliding from left. Since this is the final CTA, maybe a stark white text with sliding gold. -->
      <span class="btn-text">Confirm Order</span>
    </button>
  </aside>
</section>

<!-- TOAST -->
<div class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-charcoal text-alabaster text-[10px] uppercase tracking-widest px-8 py-4 z-[60] transform translate-y-24 opacity-0 transition-all duration-500 shadow-[0_8px_32px_rgba(0,0,0,0.15)]" id="toast"></div>

<!-- GLOBAL PERSISTENT PLAYER -->
<div class="global-player" id="globalPlayer">
    <div class="global-seek-bar" id="seekBar">
        <div class="global-seek-progress" id="seekProgress"></div>
    </div>
    <div class="global-player-inner">
        <div class="mini-album-wrapper" id="albumArt">
            <div class="mini-vinyl">
                <img src="https://images.unsplash.com/photo-1470225620780-dba8ba36b745?q=80&w=600" alt="Art" class="mini-album-img">
            </div>
        </div>
        <div class="mini-metadata">
            <h4 class="serif">This Little Light</h4>
            <p>Miles Caton & Collective</p>
        </div>
        <div class="mini-controls">
            <span id="currentTime" class="text-[9px] tabular-nums text-warmgrey">0:00</span>
            <span class="mx-1 text-taupe/20">/</span>
            <span id="totalTime" class="text-[9px] tabular-nums text-warmgrey">0:00</span>
            <button id="playBtn" class="mini-play-trigger">
                <svg id="playIcon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M5 3l14 9-14 9V3z"/></svg>
                <svg id="pauseIcon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" class="hidden"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
            </button>
        </div>
    </div>
</div>

<audio id="mainAudio" preload="auto">
  <source src="music/Miles Caton, DC6 Singers Collective, Pleasant Valley Youth Choir of New Orleans - This Little Light of Mine (SPOTISAVER).mp3" type="audio/mpeg">
</audio>

<!-- JS -->
<script src="script.js"></script>
<script type="module" src="auth.js"></script>
<script>
  function loadOrder() {
    const orderData = JSON.parse(localStorage.getItem('hawkCart')) || [];
    const list = document.getElementById('checkoutList');
    let total = 0;

    if (orderData.length === 0) {
      window.location.href = 'index.html';
      return;
    }

    list.innerHTML = orderData.map(c => {
      total += c.price * c.qty;
      return `
        <div class="flex justify-between items-start mb-4 pb-4 border-b border-charcoal/5 last:border-0 last:mb-0 last:pb-0">
          <div>
            <div class="text-sm tracking-wide text-charcoal mb-1 font-light">${c.name}</div>
            <div class="text-[10px] uppercase tracking-widest text-warmgrey">Size: ${c.selectedSize} <span class="mx-1">·</span> Qty: ${c.qty}</div>
          </div>
          <div class="font-serif text-sm tracking-wide text-charcoal">₹${(c.price * c.qty).toLocaleString()}</div>
        </div>
      `;
    }).join('');

    document.getElementById('subtotalPrice').textContent = '₹' + total.toLocaleString();
    document.getElementById('totalPrice').textContent = '₹' + total.toLocaleString();
  }

  loadOrder();

  document.getElementById('checkoutForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const cartData = JSON.parse(localStorage.getItem('hawkCart')) || [];
    const total = document.getElementById('totalPrice').textContent;
    const name = document.getElementById('firstName').value + ' ' + document.getElementById('lastName').value;
    const email = document.getElementById('userEmail').value;
    const address = `${document.getElementById('userAddress').value}, ${document.getElementById('userCity').value} - ${document.getElementById('userZip').value}`;
    const phone = document.getElementById('userPhone').value;
    
    const productSummary = cartData.map(c => `- ${c.name} (Size: ${c.selectedSize}) x ${c.qty} | ₹${c.price * c.qty}`).join('\n');

    const templateParams = {
      merchant_email: "nighthawkpvt@gmail.com", 
      customer_name: name,
      customer_email: email,
      customer_phone: phone,
      shipping_address: address,
      order_details: productSummary,
      total_amount: total,
      payment_method: "Cash on Delivery",
      brand_description: "Night Hawk is an elite streetwear and performance brand engineered for maximum power and architectural aesthetics."
    };

    showToast('CONFIRMING ORDER...');

    emailjs.send("service_1ta4h6d", "template_v2fagx9", templateParams)
      .then(() => emailjs.send("service_1ta4h6d", "template_kujnemh", templateParams))
      .then(() => {
        showToast('ORDER SECURED.');
        localStorage.removeItem('hawkCart');
        setTimeout(() => { window.location.href = 'index.html'; }, 2000);
      })
      .catch((err) => {
        console.error("Email Error:", err);
        showToast('ORDER PLACED! (Email notification pending)');
        localStorage.removeItem('hawkCart');
        setTimeout(() => { window.location.href = 'index.html'; }, 2000);
      });
  });
</script>
</body>
</html>
